<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PCGameBenchmark Replica</title>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
        <div class="container nav-flex">
            <div class="logo">PCGameBenchmark</div>
            
            <nav>
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="about.html">About Us</a></li>
                    <li><a href="contact.html" class="active">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section class="container" style="padding: 80px 0; text-align: center;">
            <h1>Contact Us</h1>
            <p style="color: #aab2bd; margin-bottom: 40px;">Have a suggestion? Let us know!</p>

            <form style="max-width: 500px; margin: 0 auto; display: flex; flex-direction: column; gap: 15px;">
                <input type="text" placeholder="Your Name" style="padding: 15px; border-radius: 5px; border: none;">
                <input type="email" placeholder="Your Email" style="padding: 15px; border-radius: 5px; border: none;">
                <textarea rows="5" placeholder="Your Message" style="padding: 15px; border-radius: 5px; border: none; font-family: sans-serif;"></textarea>
                
                <button type="submit" style="padding: 15px; background-color: #316bf4; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">Send Message</button>
            </form>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2025 PCGameBenchmark. Created by Kanishka S (1dt24cg017), Haneesh Raj A N (1dt24cg016).</p>
        </div>
    </footer>

</body>
</html>
